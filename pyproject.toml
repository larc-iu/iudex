[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "iudex"
version = "0.1.0"
description = "Minimal top-down RST parser with mixed span batching"
requires-python = ">=3.10"
dependencies = [
    "torch",
    "transformers",
    "tonga-config",
    "lxml",
    "rich",
]

[tool.setuptools.packages.find]
include = ["iudex*"]
